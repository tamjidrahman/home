# Pinned so the project/network/container names don't depend on the
# directory the compose command runs from (matters for the CI runner,
# whose workspace path != /home/tamjid/src/home).
name: home

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # CI sets TAG=<commit-sha>; local dev gets :latest. With both build
    # and image set, `docker compose build` tags with the image name and
    # `docker compose push` pushes to the Forgejo registry.
    image: git.basha.cloud/tamjid/home-api:${TAG:-latest}
    ports:
      - "8000:8000"
    environment:
      # Must be resolvable from inside the container (containers don't do mDNS,
      # so homeassistant.local won't work — use an IP or a routable hostname).
      HOMEASSISTANT_URL: ${HOMEASSISTANT_URL:-http://homeassistant.local:8123}
      # Long-lived HA token used only at server startup to fetch vacuum room
      # metadata so /docs can render a Room dropdown. Per-request auth still
      # comes from the bearer the client sends.
      SERVICE_HOMEASSISTANT_TOKEN: ${SERVICE_HOMEASSISTANT_TOKEN:-}
    volumes:
      - ./config.toml:/app/config.toml:ro
    restart: unless-stopped

  ui:
    build:
      context: ./home-ui
      dockerfile: Dockerfile
      args:
        # Browser-reachable URL (fetches run client-side, so must resolve from the browser's host)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.basha.cloud}
    image: git.basha.cloud/tamjid/home-ui:${TAG:-latest}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
